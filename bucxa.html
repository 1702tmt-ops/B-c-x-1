<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body>
<div id="gauge" style="width:100%;height:400px;"></div>

<script>
var chart = echarts.init(document.getElementById('gauge'));

var option = {
  series: [{
    type: 'gauge',
    min: 0,
    max: 50,
    axisLine: {
      lineStyle: {
        width: 20,
        color: [
          [0.4, '#3498db'],  // <20°C (xanh)
          [0.7, '#2ecc71'],  // 20–35°C (xanh lá)
          [1, '#e74c3c']     // >35°C (đỏ)
        ]
      }
    },
    pointer: { show: true },
    detail: { formatter: '{value}°C' },
    data: [{ value: 0 }]
  }]
};

chart.setOption(option);

// 🔥 Lấy dữ liệu từ cảm biến (API)
async function fetchTemp() {
  try {
    const res = await fetch("https://your-api/temperature");
    const data = await res.json();

    chart.setOption({
      series: [{
        data: [{ value: data.value }]
      }]
    });

  } catch (e) {
    console.error("Lỗi lấy nhiệt độ", e);
  }
}

// cập nhật mỗi 5 giây
setInterval(fetchTemp, 5000);
fetchTemp();
</script>
</body>
</html>
