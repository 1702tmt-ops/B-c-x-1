<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Temperature Gauge</title>
  <script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
</head>
<body>
  <h3 style="text-align:center">Nhiệt độ realtime</h3>
  <canvas id="gauge" width="200" height="150"></canvas>
  <div id="value" style="text-align:center;font-size:20px;"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);

    const min = parseFloat(urlParams.get("min")) || 0;
    const max = parseFloat(urlParams.get("max")) || 100;
    const warning = parseFloat(urlParams.get("warning")) || 35;
    const danger = parseFloat(urlParams.get("danger")) || 45;

    const opts = {
      angle: 0,
      lineWidth: 0.2,
      radiusScale: 1,
      pointer: {
        length: 0.6,
        strokeWidth: 0.04,
        color: "#000"
      },
      staticZones: [
        { strokeStyle: "#00ff00", min: min, max: warning },
        { strokeStyle: "#ffff00", min: warning, max: danger },
        { strokeStyle: "#ff0000", min: danger, max: max }
      ],
      limitMax: false,
      limitMin: false
    };

    const target = document.getElementById("gauge");
    const gauge = new Gauge(target).setOptions(opts);

    gauge.maxValue = max;
    gauge.setMinValue(min);
    gauge.animationSpeed = 32;

    async function fetchTemperature() {
      try {
        const res = await fetch("http://localhost:3000/temperature");
        const data = await res.json();

        const temp = data.temperature;

        gauge.set(temp);
        document.getElementById("value").innerText = temp + " °C";
      } catch (err) {
        console.error("Error:", err);
      }
    }

    // update mỗi 1 giây
    setInterval(fetchTemperature, 3000);
    fetchTemperature();
  </script>
</body>
</html>
